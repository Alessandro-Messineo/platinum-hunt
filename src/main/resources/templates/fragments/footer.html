<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="footer">
    <script th:src="@{/webjars/bootstrap/5.3.5/js/bootstrap.bundle.min.js}"></script>
    <script>
        const modal = document.getElementById('deleteModal')
        if (modal) {
            modal.addEventListener('show.bs.modal', function (event) {
                const itemId = event.relatedTarget.getAttribute('data-item-id')
                document.getElementById('deleteForm').action = event.relatedTarget.getAttribute('data-action')
            })
        }
    </script>
</div>
</body>
</html>
