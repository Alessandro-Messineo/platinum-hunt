<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/games}">
            PlatinumHunt
        </a>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/games}">Games</a>
                </li>
                <!-- <li class="nav-item">
                    <a class="nav-link" th:href="@{/trophies}">Trophies</a>
                </li> -->
            </ul>
            <div class="d-flex align-items-center gap-3">
                <span sec:authorize="isAuthenticated()" class="text-white">
                    Hello, <strong sec:authentication="name"></strong>!
                </span>
                <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post">
                    <button type="submit" class="btn btn-outline-danger btn-sm">Logout</button>
                </form>
            </div>
        </div>
    </div>
</nav>
</body>
</html>
