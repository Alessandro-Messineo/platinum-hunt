<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"></head>
<body class="bg-light">
    <nav th:replace="~{fragments/navbar :: navbar}"></nav>
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card shadow-sm text-center p-4" style="max-width: 500px;">
            <div class="card-body">
                <h1 class="text-danger mb-3">Oops!</h1>
                <p class="fw-bold" th:text="'Error: ' + ${status}"></p>
                <p class="text-muted" th:text="${error}"></p>
                <p class="text-muted" th:text="${message}"></p>
                <a th:href="@{/games}" class="btn btn-primary mt-3">Back to Games</a>
            </div>
        </div>
    </div>
</body>
</html>
