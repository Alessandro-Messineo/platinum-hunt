<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: header}"></head>

<body>
    <nav th:replace="~{fragments/navbar :: navbar}"></nav>

    <div class="container mt-4">

        <h1 class="mb-4 text-center display-4">Games catalogue</h1>

        <div class="d-flex justify-content-between mb-4">
            <div class="d-flex gap-2">
                <a th:href="@{/games/create}" class="btn btn-primary">Add Game</a>
            </div>
        </div>

        <table class="table table-striped table-hover table-sm align-middle">
            <thead class="table-dark">
                <tr>
                    <th>Cover</th>
                    <th class="text-center mb-4">Name</th>
                    <th style="width: 180px;">Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="game : ${games}" th:object="${game}">
                    <td>
                        <img th:src="*{img}" alt="error img" width="60" height="80">
                    </td>
                    <td class="text-center" th:text="*{name}"></td>
                    <td style="width: 180px;">
                        <div class="d-flex gap-2 justify-content-end">
                            <a th:href="@{/games/{id}(id=*{id})}" class="btn btn-sm btn-primary">View</a>
                            <a th:href="@{/games/edit/{id}(id=*{id})}" class="btn btn-sm btn-warning">Edit</a>
                            <!-- <form th:action="@{/games/delete/{id}(id=*{id})}" method="post" class="m-0">
                                <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                            </form> -->

                            <button type="button" class="btn btn-sm btn-danger" data-bs-toggle="modal"
                                data-bs-target="#deleteModal" th:data-action="@{/games/delete/{id}(id=*{id})}">
                                Delete
                            </button>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>

        <div th:if="${games.size() == 0}" class="alert alert-warning text-center">
            No games available.
        </div>

    </div>

    <div class="modal fade" id="deleteModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Confirm Delete</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    Are you sure you want to delete this game?
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <form id="deleteForm" method="post">
                        <button type="submit" class="btn btn-danger">Delete</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>

</html>
