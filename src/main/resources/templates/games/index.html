<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: header}"></head>

<body>
    <nav th:replace="~{fragments/navbar :: navbar}"></nav>
    <!-- <nav th:replace="~{fragments/navbar :: navbar}"></nav> -->

    <div class="container mt-4">

        <h1 class="mb-4 text-center display-4">Catalogo giochi</h1>

        <!-- <div class="d-flex justify-content-between mb-4">
            <div class="d-flex gap-2">
                <a sec:authorize="hasAuthority('ADMIN')" th:href="@{/create}" class="btn btn-primary">Aggiungi pizza</a>
                <a sec:authorize="hasAuthority('ADMIN')" th:href="@{/ingredient}" class="btn btn-outline-primary">Gestisci ingredienti</a>
            </div>

            <form th:action="@{/}" class="d-flex">
                <input type="text" name="search" th:value="${search}" class="form-control me-2"
                    placeholder="Cerca pizza per nome...">
                <button class="btn btn-primary" type="submit">Cerca</button>
            </form>
        </div> -->

        <table class="table table-striped table-hover table-sm align-middle">
            <thead class="table-dark">
                <tr>
                    <th>Cover</th>
                    <th class="text-center mb-4">Name</th>
                    <!-- <th class="text-center">Difficulty</th>
                    <th class="text-center">Hours</th>
                    <th class="text-center">Playthroughs</th> -->
                    <th style="width: 180px;">Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="game : ${games}" th:object="${game}">
                    <td>
                        <img th:src="*{img}" alt="error img" width="60" height="80">
                    </td>
                    <td class="text-center" th:text="*{name}"></td>
                    <!-- <td class="text-center" th:text="*{difficulty} + '/10'"></td>
                    <td class="text-center" th:text="*{hours} + 'h'"></td>
                    <td class="text-center" th:text="*{playthrough}"></td> -->
                    <td style="width: 180px;">
                        <div class="d-flex gap-2 justify-content-end">
                            <a th:href="@{'/games/' + *{id}}" class="btn btn-sm btn-primary">View</a>
                            <a th:href="@{/games/edit/{id}(id=*{id})}" class="btn btn-sm btn-warning">Edit</a>
                            <form th:action="@{/games/delete/{id}(id=*{id})}" method="post" class="m-0">
                                <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                            </form>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>

        <div th:if="${games.size() == 0}" class="alert alert-warning text-center">
            No games available.
        </div>

    </div>
</body>

</html>
